spring.application.name=ms-adopciones
server.port=8085

spring.datasource.url=jdbc:mysql://localhost:3306/db_adopciones
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Mapeo de end-points externos para orquestación WebClient
usuario-service.url=http://localhost:8081/api/usuarios
refugio-service.url=http://localhost:8084/api/refugios
mascota-service.url=http://localhost:8086/api/mascotas