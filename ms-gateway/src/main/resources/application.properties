spring.application.name=ms-gateway
server.port=8080

eureka.client.service-url.defaultZone=http://${EUREKA_HOST:localhost}:8761/eureka/

# ═══════════════════════════════════════
# RUTAS DEL SISTEMA PATITAS
# ═══════════════════════════════════════

# 1. Usuarios (8081)
spring.cloud.gateway.routes[0].id=ms-usuarios
spring.cloud.gateway.routes[0].uri=http://${USUARIO_HOST:localhost}:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/usuarios/**

# 2. Autenticacion (8082)
spring.cloud.gateway.routes[1].id=ms-autenticacion
spring.cloud.gateway.routes[1].uri=http://${AUTENTICACION_HOST:localhost}:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/auth/**

# 3. Refugios (8084)
spring.cloud.gateway.routes[2].id=ms-refugios
spring.cloud.gateway.routes[2].uri=http://${REFUGIO_HOST:localhost}:8084
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/refugios/**

# 4. Adopciones (8085)
spring.cloud.gateway.routes[3].id=ms-adopciones
spring.cloud.gateway.routes[3].uri=http://${ADOPCION_HOST:localhost}:8085
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/adopciones/**

# 5. Mascotas (8086)
spring.cloud.gateway.routes[4].id=ms-mascotas
spring.cloud.gateway.routes[4].uri=http://${MASCOTA_HOST:localhost}:8086
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/mascotas/**

# 6. Reportes (8087)
spring.cloud.gateway.routes[5].id=ms-reportes
spring.cloud.gateway.routes[5].uri=http://${REPORTE_HOST:localhost}:8087
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/reportes/**

# 7. Publicaciones (8088)
spring.cloud.gateway.routes[6].id=ms-publicaciones
spring.cloud.gateway.routes[6].uri=http://${PUBLICACION_HOST:localhost}:8088
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/publicaciones/**

# 8. Pedidos (8089)
spring.cloud.gateway.routes[7].id=ms-pedidos
spring.cloud.gateway.routes[7].uri=http://${PEDIDO_HOST:localhost}:8089
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/pedidos/**
