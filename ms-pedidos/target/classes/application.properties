spring.application.name=ms-pedidos
server.port=8089

spring.datasource.url=jdbc:mysql://localhost:3306/db_pedidos
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# URLs base para WebClient
usuario-service.url=http://localhost:8081/api/usuarios
publicacion-service.url=http://localhost:8088/api/publicaciones